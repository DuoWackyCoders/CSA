<!DOCTYPE html>
<html>
<head>
<title>CSA - Carrier Signal Analyzer</title>
</head>

<body>

<h1>CSA</h1>
<h3>Carrier Signal Analyzer</h3>

<p>Manual Carrier Entry</p>

<label>Carrier:</label>
<select>
<option>AT&T</option>
<option>Verizon</option>
<option>T-Mobile</option>
</select>

<br><br>

<label>RSRP (dBm)</label>
<input type="number">

<br><br>

<label>RSRQ</label>
<input type="number">

<br><br>

<label>RSSI</label>
<input type="number">

<br><br>

<label>SINR</label>
<input type="number">

<br><br>

<label>Signal % (optional)</label>
<input type="number">

<br><br>

<button>Analyze</button>

</body>
</html>
