<!DOCTYPE html>
<html>
<head>
<title>CSA - Carrier Signal Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CSA</h1>
<h2>Carrier Signal Analyzer</h2>

<table class="signal-table">

<tr>
<th></th>
<th>AT&T</th>
<th>Verizon</th>
<th>T-Mobile</th>
</tr>

<tr>
<td>RSRP (dBm)</td>
<td><input id="att_rsrp" type="number"></td>
<td><input id="verizon_rsrp" type="number"></td>
<td><input id="tmobile_rsrp" type="number"></td>
</tr>

<tr>
<td>RSRQ</td>
<td><input id="att_rsrq" type="number"></td>
<td><input id="verizon_rsrq" type="number"></td>
<td><input id="tmobile_rsrq" type="number"></td>
</tr>

<tr>
<td>RSSI</td>
<td><input id="att_rssi" type="number"></td>
<td><input id="verizon_rssi" type="number"></td>
<td><input id="tmobile_rssi" type="number"></td>
</tr>

<tr>
<td>SINR</td>
<td><input id="att_sinr" type="number"></td>
<td><input id="verizon_sinr" type="number"></td>
<td><input id="tmobile_sinr" type="number"></td>
</tr>

<tr>
<td>Signal %</td>
<td><input id="att_percent" type="number"></td>
<td><input id="verizon_percent" type="number"></td>
<td><input id="tmobile_percent" type="number"></td>
</tr>

</table>

<button id="analyzeBtn">Analyze</button>

<div id="result"></div>
  
</body>
  
</html>
