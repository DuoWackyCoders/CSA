<!DOCTYPE html>
<html>
<head>
<title>CSA - Carrier Signal Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  
<h1>CSA</h1>
<h2>Carrier Signal Analyzer</h2>

<p>Manual Carrier Entry</p>

<label>Carrier *</label>
<select required>
<option value="">Select Carrier</option>
<option>AT&T</option>
<option>Verizon</option>
<option>T-Mobile</option>
</select>

<br><br>

<label>RSRP (dBm)</label>
<input type="number">

<br><br>

<label>RSRQ</label>
<input type="number">

<br><br>

<label>RSSI</label>
<input type="number">

<br><br>

<label>SINR</label>
<input type="number">

<br><br>

<label>Signal % (optional)</label>
<input type="number">

<br><br>

<button>Analyze</button>

</div>
  
</body>
</html>
